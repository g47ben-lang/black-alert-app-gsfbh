name: Build & Sign Android APK

on:
  push:
    branches: [ "main", "master", "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Detect signing secrets
      id: signing
      run: |
        if [ -n "$TOKEN" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
        fi
      env:
        TOKEN: ${{ secrets.SIGNING_REPO_TOKEN }}

    - name: Check out signing keystore
      if: steps.signing.outputs.available == 'true'
      uses: actions/checkout@v4
      with:
        repository: 613avi/black-alert-signing
        token: ${{ secrets.SIGNING_REPO_TOKEN }}
        path: signing

    - name: Build signed Release APK
      if: steps.signing.outputs.available == 'true'
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/signing/black-alert-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: ./gradlew assembleSideloadRelease

    - name: Build Debug APK (no signing secrets configured)
      if: steps.signing.outputs.available == 'false'
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: black-alert-apk
        path: "app/build/outputs/apk/**/*.apk"
