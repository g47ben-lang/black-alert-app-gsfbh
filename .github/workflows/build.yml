name: Build & Sign Android APK

on:
  push:
    branches: [ "main", "master", "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v4

    - name: Check out signing repo
      uses: actions/checkout@v4
      with:
        repository: g47ben-lang/black-alert-signing
        token: ${{ secrets.SIGNING_REPO_TOKEN }}
        path: signing

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build & sign Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/signing/black-alert-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: ./gradlew assembleSideloadRelease

    - name: Upload signed APK
      uses: actions/upload-artifact@v4
      with:
        name: black-alert-signed
        path: "app/build/outputs/apk/**/*.apk"
